{% load ishar %}
<form class="d-flex gap-1" method="post" action="{% url 'players' %}#search" role="search" id="player-search-form" aria-label="Player search">
    {% csrf_token %}
    <div class="ac-inputgroup flex-grow-1">
        <span class="ac-inputgroup__icon">{% bi "search" %}</span>
        {{ PLAYER_SEARCH_FORM.name }}
    </div>
    <button class="ac-btn ac-btn--accent" type="submit">Search</button>
</form>
